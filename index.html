<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Cintaku ❤️</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#ff758c,#ff7eb3);
    color:white;
    text-align:center;
    overflow:hidden;
}

/* SCREEN */
.screen {
    display:none;
    height:100vh;
    padding:20px;
    box-sizing:border-box;
    position:relative;
    z-index:2;
}

.active {
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* GAMBAR */
img {
    width:85%;
    max-width:320px;
    border-radius:20px;
    margin-top:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* KADO */
.gift {
    font-size:80px;
    animation:bounce 1s infinite;
    cursor:pointer;
    user-select:none;
}

@keyframes bounce {
    50%{transform:translateY(-12px);}
}

/* TEXT */
#text {
    width:90%;
    font-size:18px;
    line-height:1.6;
    margin-top:20px;
    white-space:pre-line;
}

.cursor {
    display:inline-block;
    width:2px;
    height:20px;
    background:white;
    margin-left:5px;
    animation:blink 1s infinite;
}

@keyframes blink {
    50%{opacity:0;}
}

/* HEART */
.heart {
    position:absolute;
    animation:float 5s linear infinite;
    font-size:20px;
}

@keyframes float {
    0%{transform:translateY(100vh);opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* FADE ANIMATION */
.fade {
    animation:fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:scale(0.9);}
    to {opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="lagu.mp3" type="audio/mpeg">
</audio>

<!-- GIFT SCREEN -->
<div class="screen active" id="gift">
    <h2>Ada sesuatu untuk kamu 🎁</h2>
    <div class="gift" onclick="start()">🎁</div>
    <p>(Klik kadonya ya ❤️)</p>
</div>

<!-- FINAL SCREEN -->
<div class="screen" id="final">
    <h2>Teruntuk Istriku ❤️</h2>

    <img src="foto.jpeg" class="fade">

    <div id="text"></div><span class="cursor"></span>
</div>

<script>
let music = document.getElementById("music");

function start(){
    // Play music (safe for browser)
    music.play().catch(()=>{});

    // pindah screen
    document.getElementById("gift").classList.remove("active");
    let final = document.getElementById("final");
    final.classList.add("active","fade");

    typeText();
}

// 💌 EDIT PESAN DI SINI
let message = `Selamat ulang tahun, cintaku...
Hari ini bukan hanya tentang bertambahnya usia...
Tapi tentang betapa bersyukurnya aku memiliki kamu...
I LOVE YOU ❤️❤️❤️`;



let i = 0;

function typeText(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;

        let speed = 40;

        // jeda natural
        if(message.charAt(i-1) === "." || message.charAt(i-1) === "\n"){
            speed = 300;
        }

        setTimeout(typeText, speed);
    }
}

// ❤️ ANIMASI LOVE
function heart(){
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (Math.random()*20 + 15) + "px";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),5000);
}

setInterval(heart,300);
</script>

</body>
</html>
