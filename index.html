<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Cintaku ❤️</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#ff758c,#ff7eb3);
    color:white;
    text-align:center;
    overflow:hidden;
}

.screen {display:none;height:100vh;padding:20px;box-sizing:border-box;}
.active {display:flex;flex-direction:column;justify-content:center;align-items:center;}

img {
    width:85%;
    max-width:320px;
    border-radius:20px;
    margin-top:15px;
}

.gift {
    font-size:80px;
    animation:bounce 1s infinite;
    cursor:pointer;
}

@keyframes bounce {
    50%{transform:translateY(-10px);}
}

#text {
    width:90%;
    font-size:18px;
    line-height:1.6;
    margin-top:20px;
    white-space:pre-line;
}

.cursor {
    display:inline-block;
    width:2px;
    background:white;
    margin-left:5px;
    animation:blink 1s infinite;
}

@keyframes blink {
    50%{opacity:0;}
}

.heart {
    position:absolute;
    animation:float 5s linear infinite;
}

@keyframes float {
    0%{transform:translateY(100vh);opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="lagu.mp3">
</audio>

<!-- GIFT -->
<div class="screen active" id="gift">
    <h2>Ada sesuatu untuk kamu 🎁</h2>
    <div class="gift" onclick="start()">🎁</div>
</div>

<!-- FINAL -->
<div class="screen" id="final">
    <h2>Istriku</h2>

    <img src="foto.jpeg">

    <div id="text"></div><span class="cursor"></span>
</div>

<script>
let music = document.getElementById("music");

function start(){
    music.play();
    document.getElementById("gift").classList.remove("active");
    document.getElementById("final").classList.add("active");
    typeText();
}

// 💌 TEXT EMOTIONAL (EDIT DI SINI)
let message = `Selamat ulang tahun, cintaku...

Hari ini bukan hanya tentang bertambahnya usia...
Tapi tentang betapa bersyukurnya aku memiliki kamu...

Terima kasih sudah hadir dalam hidupku...
Menjadi tempatku pulang...
Menjadi alasanku tersenyum setiap hari...

Aku mungkin tidak sempurna...
Tapi cintaku ke kamu, selalu utuh ❤️

Hari ini...
Besok...
Dan selamanya...`;

let i = 0;

function typeText(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;

        let speed = 40;

        // kasih jeda di titik biar lebih natural
        if(message.charAt(i-1) === "." || message.charAt(i-1) === "\n"){
            speed = 300;
        }

        setTimeout(typeText, speed);
    }
}

// HEARTS
function heart(){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
}
setInterval(heart,300);
</script>

</body>
</html>
