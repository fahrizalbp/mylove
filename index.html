<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Cintaku ❤️</title>

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:linear-gradient(#ff758c,#ff7eb3);
    color:white;
    overflow-x:hidden;
}

/* container utama */
.container {
    min-height:100vh;
    padding:30px 20px 100px;
    box-sizing:border-box;
    text-align:center;
}

/* gift */
.gift {
    font-size:70px;
    margin-top:40vh;
    animation:bounce 1s infinite;
    cursor:pointer;
}

@keyframes bounce {
    50%{transform:translateY(-10px);}
}

/* konten */
.content {
    display:none;
    max-width:500px;
    margin:auto;
}

img {
    width:100%;
    border-radius:20px;
    margin-top:15px;
}

/* text */
#text {
    font-size:17px;
    line-height:1.7;
    margin-top:20px;
    text-align:left;
    white-space:pre-line;
}

/* cursor */
.cursor {
    display:inline-block;
    width:2px;
    background:white;
    margin-left:3px;
    animation:blink 1s infinite;
}

@keyframes blink {
    50%{opacity:0;}
}

/* hearts */
.heart {
    position:fixed;
    bottom:-10px;
    animation:float 5s linear infinite;
}

@keyframes float {
    to {
        transform:translateY(-110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="lagu.mp3">
</audio>

<div class="container">

    <!-- GIFT -->
    <div id="gift">
        <h2>Ada sesuatu untuk kamu 🎁</h2>
        <div class="gift" onclick="start()">🎁</div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content">
        <h2>Teruntuk Istriku ❤️</h2>
        <img src="foto.jpeg">
        <div id="text"></div><span class="cursor"></span>
    </div>

</div>

<script>
let music = document.getElementById("music");

function start(){
    music.play();
    document.getElementById("gift").style.display="none";
    document.getElementById("content").style.display="block";
    typeText();
}

// 💌 EDIT PESAN DI SINI
let message = `Selamat ulang tahun, cintaku ❤️...

Hari ini bukan hanya tentang bertambahnya usia...
Tapi tentang betapa bersyukurnya aku memiliki kamu...

Terima kasih sudah selalu ada...
Menjadi tempatku pulang...
Menjadi alasan aku tersenyum setiap hari...

Aku mungkin tidak sempurna...
Tapi cintaku ke kamu, selalu utuh ❤️

Hari ini...
Besok...
Dan selamanya...`;

let i = 0;

function typeText(){
    if(i < message.length){
        let el = document.getElementById("text");
        el.innerHTML += message.charAt(i);

        // auto scroll natural (tidak lompat)
        window.scrollTo(0, document.body.scrollHeight);

        let speed = 35;

        if(message.charAt(i) === "." || message.charAt(i) === "\n"){
            speed = 200;
        }

        i++;
        setTimeout(typeText, speed);
    }
}

// hearts
function heart(){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*10+15)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
}
setInterval(heart,400);
</script>

</body>
</html>
